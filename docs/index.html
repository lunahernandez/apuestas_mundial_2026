<style>
:root {
    --crema: #FFF8EC;
    --marino: #16213E;
    --marino-10: rgba(22,33,62,0.1);
    --amarillo: #FFD23F;
    --coral: #FF5C4D;
    --azul: #2EC4F1;
    --verde: #1FAA59;
    --gris: #8D99AE;

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {

    background: var(--crema);
    background-image:

    color: var(--marino);
    min-height: 100vh;
}
header {
    position: relative;
    background: var(--marino);
    padding: 36px 24px 30px;
    text-align: center;
    overflow: hidden;
    border-bottom: 6px solid var(--amarillo);
}
header::before, header::after {
    content: "⚽";
    position: absolute;
    font-size: 4rem;
    opacity: 0.08;
}
header::before { top: -10px; left: -10px; transform: rotate(-15deg); }
header::after { bottom: -20px; right: -10px; transform: rotate(20deg); }
.header-title {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    font-weight: 700;
    color: var(--crema);
}
.header-title .accent { color: var(--amarillo); }
.header-sub { font-size: 0.9rem; color: var(--azul); margin-top: 6px; font-weight: 500; }
.badge {

    margin-top: 14px;
    font-family: 'Fredoka', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 6px 18px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
}
.badge-open { background: var(--amarillo); color: var(--marino); }
.badge-closed { background: var(--coral); color: var(--crema); }
main { max-width: 880px; margin: 0 auto; padding: 28px 16px 60px; }
section { margin-bottom: 44px; }
.section-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--marino);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.section-title .dot {
    width: 14px; height: 14px;
    background: var(--coral);
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
}
.clasificacion { display: flex; flex-direction: column; gap: 10px; }
.jugador-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #fff;
    border: 2px solid var(--marino-10);
    border-radius: 16px;
    padding: 12px 16px;
}
.jugador-row.top3 { border-color: var(--borde-pos); border-width: 2.5px; }
.avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--crema);
    border: 2px solid var(--borde-pos, var(--marino-10));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.1rem;
    flex-shrink: 0;
}
.jugador-main { flex: 1; min-width: 0; }
.jugador-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; gap: 8px; }
.nombre { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 1.02rem; }
.pts { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 1rem; color: var(--coral); white-space: nowrap; }
.barra-wrap { width: 100%; height: 8px; background: var(--marino-10); border-radius: 999px; overflow: hidden; margin-bottom: 4px; }
.barra-fill { height: 100%; background: linear-gradient(90deg, var(--azul), var(--verde)); border-radius: 999px; transition: width 0.6s ease; }
.stats { font-size: 0.74rem; color: var(--gris); }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.tab {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 999px;
    border: 2px solid var(--marino-10);
    background: #fff;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--gris);
}
.tab.active { background: var(--marino); color: var(--crema); border-color: var(--marino); }
.tab:hover:not(.active) { border-color: var(--marino); color: var(--marino); }
.fase-label {
    margin: 24px 0 10px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.fase-label span {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    background: var(--c);
    color: #fff;
    padding: 5px 14px;
    border-radius: 999px;
}
.fase-label::after {
    content: "";
    flex: 1;
    height: 2px;
    background: repeating-linear-gradient(90deg, var(--c) 0 6px, transparent 6px 12px);
    opacity: 0.4;
}
.cromo {
    background: #fff;
    border-radius: 18px;
    border: 2.5px dashed var(--c);
    padding: 16px 18px;
    margin-bottom: 14px;
}
.cromo-top {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
}
.equipo { display: flex; align-items: center; gap: 8px; min-width: 0; }
.equipo-derecha { justify-content: flex-end; text-align: right; }
.equipo-nombre {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.marcador { text-align: center; min-width: 60px; }
.resultado { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 1.3rem; color: var(--marino); }
.sin-resultado { font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 1rem; color: var(--gris); }
.cromo-fecha { text-align: center; font-size: 0.72rem; color: var(--gris); margin-top: 6px; letter-spacing: 0.05em; }
.apuestas-grid {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--marino-10);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
}
.apuesta-row { display: flex; align-items: center; gap: 6px; }
.part-nombre { font-size: 0.76rem; color: var(--gris); font-weight: 500; }
.chip {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.74rem; font-weight: 600;
    padding: 3px 10px; border-radius: 999px;
    background: var(--crema);
    border: 1.5px solid var(--marino-10);
}
.chip-acierto { background: rgba(31,170,89,0.12); border-color: var(--verde); color: var(--verde); }
.chip-fallo { background: rgba(255,92,77,0.10); border-color: var(--coral); color: var(--coral); }
.chip-vacio { color: var(--gris); border-style: dashed; }
.apostar-box {
    background: #fff;
    border: 2px solid var(--marino-10);
    border-radius: 18px;
    padding: 24px;
}
.apostar-box h3 {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 16px;
}
.input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
input[type=text], input[type=password] {
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    padding: 10px 16px;
    border: 2px solid var(--marino-10);
    border-radius: 10px;
    background: var(--crema);
    color: var(--marino);
    flex: 1;
    min-width: 160px;
    outline: none;
}
input[type=text]:focus, input[type=password]:focus { border-color: var(--azul); }
.btn {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--marino); color: var(--crema); }
.btn-accent { background: var(--amarillo); color: var(--marino); }
.btn-danger { background: var(--coral); color: #fff; }
.btn-sm { font-size: 0.78rem; padding: 5px 14px; border-radius: 8px; }
.partido-apuesta {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px dashed var(--marino-10);
}
.partido-apuesta:last-child { border-bottom: none; }
.partido-info { font-size: 0.88rem; font-weight: 500; }
.partido-info small { display: block; font-size: 0.72rem; color: var(--gris); margin-top: 2px; }
.opciones-apuesta { display: flex; gap: 6px; }
.opt {
    font-family: 'Fredoka', sans-serif;

    border-radius: 8px;
    border: 2px solid var(--marino-10);
    background: var(--crema);
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;

.opt:hover { border-color: var(--azul); }
.opt.sel-local { background: var(--azul); color: #fff; border-color: var(--azul); }
.opt.sel-empate { background: var(--amarillo); color: var(--marino); border-color: var(--amarillo); }
.opt.sel-visitante { background: var(--coral); color: #fff; border-color: var(--coral); }
.msg { font-size: 0.84rem; margin-top: 12px; padding: 10px 16px; border-radius: 10px; }
.msg-ok { background: rgba(31,170,89,0.12); color: var(--verde); }
.msg-err { background: rgba(255,92,77,0.1); color: var(--coral); }
.msg-info { background: rgba(46,196,241,0.1); color: #1a8aad; }

    display: inline-block;
    width: 18px; height: 18px;
    border: 3px solid var(--marino-10);
    border-top-color: var(--marino);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay {
    text-align: center;
    padding: 40px;
    color: var(--gris);
    font-family: 'Fredoka', sans-serif;
    font-size: 1rem;

.admin-panel {

    border: 2px solid var(--marino-10);
    border-radius: 18px;
    padding: 24px;

.admin-partido-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;

    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--marino-10);
    font-size: 0.85rem;

.admin-partido-row:last-child { border-bottom: none; }
.score-input {
    width: 44px;
    text-align: center;
    padding: 6px 4px;
    min-width: 0;

.admin-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.empty-msg { color: var(--gris); font-style: italic; font-size: 0.9rem; }
footer { text-align: center; padding: 28px; font-size: 0.76rem; color: var(--gris); }
.hidden { display: none !important; }
@media (max-width: 480px) {

    .opt { padding: 4px 7px; font-size: 0.7rem; }

                </div>
            </div>
        </div>
    </section>
</main>

let apuestasAbiertas = true
let usuarioActual = null
let usuarioId = null
let apuestasUsuario = {}
let resultados = {}
let adminLogado = false

async function sbGet(table, params = '') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    })
    return r.json()
}

async function sbPost(table, body) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: 'POST',
        headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            Prefer: 'return=representation'
        },
        body: JSON.stringify(body)
    })
    return r.json()
}

async function sbUpsert(table, body, onConflict) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?on_conflict=${onConflict}`, {
        method: 'POST',
        headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            Prefer: 'resolution=merge-duplicates,return=representation'
        },
        body: JSON.stringify(body)
    })
    return r.json()
}

async function sbDelete(table, params) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
        method: 'DELETE',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    })
    return r.ok
}

async function cargarConfig() {
    const rows = await sbGet('config', 'select=clave,valor')
    if (!rows || rows.error) return
    const cfg = {}
    rows.forEach(r => cfg[r.clave] = r.valor)
    if (cfg.apuestas_abiertas !== undefined) apuestasAbiertas = cfg.apuestas_abiertas === 'true'
    if (cfg.admin_hash !== undefined) window._adminHash = cfg.admin_hash
    const badge = document.getElementById('badge-estado')
    badge.textContent = apuestasAbiertas ? 'Apuestas abiertas' : 'Apuestas cerradas'
    badge.className = 'badge ' + (apuestasAbiertas ? 'badge-open' : 'badge-closed')
}

function showTab(tab) {
    document.querySelectorAll('section[id^="tab-"]').forEach(s => s.classList.add('hidden'))
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
    document.getElementById('tab-' + tab).classList.remove('hidden')
    event.target.classList.add('active')
    if (tab === 'clasificacion') renderClasificacion()
    if (tab === 'partidos') renderPartidos()
    if (tab === 'admin' && adminLogado) cargarAdminPartidos()
}

async function renderClasificacion() {
    const el = document.getElementById('clasificacion-content')
    el.innerHTML = '<div class="loading-overlay"><span class="spinner"></span>Cargando...</div>'
    const [participantes, apuestas, resultadosDB] = await Promise.all([
        sbGet('participantes', 'select=id,nombre'),
        sbGet('apuestas', 'select=participante_id,partido_id,ganador'),
        sbGet('resultados', 'select=partido_id,resultado_local,resultado_visitante')
    ])
    resultados = {}
    if (resultadosDB && !resultadosDB.error) resultadosDB.forEach(r => resultados[r.partido_id] = r)
    if (!participantes || participantes.error || participantes.length === 0) {
        el.innerHTML = '<p class="empty-msg">Nadie ha apostado todavía.</p>'
        return
    }
    const ranking = participantes.map(p => {
        const misApuestas = apuestas.filter(a => a.participante_id === p.id)
        let puntos = 0, aciertos = 0, jugados = 0
        misApuestas.forEach(a => {
            const r = resultados[a.partido_id]
            if (!r) return
            jugados++
            const ganadorReal = r.resultado_local > r.resultado_visitante ? 'local'
                : r.resultado_visitante > r.resultado_local ? 'visitante' : 'empate'
            if (a.ganador === ganadorReal) { puntos++; aciertos++ }
        })
        return { nombre: p.nombre, puntos, aciertos, jugados }
    }).sort((a, b) => b.puntos - a.puntos)
    const maxPts = ranking[0]?.puntos || 1
    const medallas = ['🥇','🥈','🥉']
    const coloresPos = ['#FFD23F','#C8D3DB','#FFB36B']
    el.innerHTML = '<div class="clasificacion">' + ranking.map((p, i) => {
        const barFill = maxPts > 0 ? Math.round((p.puntos / maxPts) * 100) : 0
        const medalla = medallas[i] || null
        const top3 = i < 3 ? ' top3' : ''
        const borde = coloresPos[i] || 'rgba(22,33,62,0.1)'
        const inicial = p.nombre[0].toUpperCase()
        return `<div class="jugador-row${top3}" style="--borde-pos:${borde}">
            <div class="avatar">${medalla || inicial}</div>
            <div class="jugador-main">
                <div class="jugador-top">
                    <span class="nombre">${p.nombre}</span>
                    <span class="pts">${p.puntos} pts</span>
                </div>
                <div class="barra-wrap"><div class="barra-fill" style="width:${barFill}%"></div></div>
                <span class="stats">${p.aciertos} aciertos de ${p.jugados} jugados</span>
            </div>
        </div>`
    }).join('') + '</div>'
}

async function renderPartidos() {
    const el = document.getElementById('partidos-content')
    el.innerHTML = '<div class="loading-overlay"><span class="spinner"></span>Cargando...</div>'
    const [apuestas, participantes, resultadosDB] = await Promise.all([
        sbGet('apuestas', 'select=participante_id,partido_id,ganador'),
        sbGet('participantes', 'select=id,nombre'),
        sbGet('resultados', 'select=partido_id,resultado_local,resultado_visitante')
    ])
    resultados = {}
    if (resultadosDB && !resultadosDB.error) resultadosDB.forEach(r => resultados[r.partido_id] = r)
    const fases = {}
    PARTIDOS.forEach(p => {
        const key = p.fase + (p.grupo ? ' · Grupo ' + p.grupo : '')
        if (!fases[key]) fases[key] = []
        fases[key].push(p)
    })
    let html = ''
    for (const [fase, partidos] of Object.entries(fases)) {
        const grupo = partidos[0].grupo
        const color = grupo ? (COLORES_GRUPO[grupo] || '#888') : '#16213E'
        html += `<div class="fase-label" style="--c:${color}"><span>${fase}</span></div>`
        partidos.forEach(partido => {
            const r = resultados[partido.id]
            const marcadorHtml = r
                ? `<span class="resultado">${r.resultado_local} – ${r.resultado_visitante}</span>`
                : `<span class="sin-resultado">vs</span>`
            const ganadorReal = r
                ? (r.resultado_local > r.resultado_visitante ? 'local'
                    : r.resultado_visitante > r.resultado_local ? 'visitante' : 'empate')
                : null
            let chipsHtml = ''
            if (participantes && !participantes.error) {
                participantes.forEach(part => {
                    const ap = apuestas.find(a => a.participante_id === part.id && a.partido_id === partido.id)
                    if (!ap) return
                    const etiq = {local: partido.local, empate: 'Empate', visitante: partido.visitante}
                    let cls = 'chip'
                    if (ganadorReal) cls += ap.ganador === ganadorReal ? ' chip-acierto' : ' chip-fallo'
                    const icono = ganadorReal ? (ap.ganador === ganadorReal ? ' ✓' : ' ✗') : ''
                    chipsHtml += `<div class="apuesta-row">
                        <span class="part-nombre">${part.nombre}</span>
                        <span class="${cls}">${etiq[ap.ganador]}${icono}</span>
                    </div>`
                })
            }
            if (!chipsHtml) chipsHtml = '<span class="chip chip-vacio">Sin apuestas aún</span>'
            html += `<div class="cromo" style="--c:${color}">
                <div class="cromo-top">
                    <div class="equipo"><span class="equipo-nombre">${partido.local}</span></div>
                    <div class="marcador">${marcadorHtml}</div>
                    <div class="equipo equipo-derecha"><span class="equipo-nombre">${partido.visitante}</span></div>
                </div>
                <div class="cromo-fecha">${partido.fecha}</div>
                <div class="apuestas-grid">${chipsHtml}</div>
            </div>`
        })
    }
    el.innerHTML = html
}

async function cargarApuestasUsuario() {
    const nombre = document.getElementById('input-nombre').value.trim()
    if (!nombre) return mostrarMsg('msg-login', 'Escribe tu nombre', 'err')
    mostrarMsg('msg-login', '<span class="spinner"></span>Buscando...', 'info')
    let rows = await sbGet('participantes', `nombre=eq.${encodeURIComponent(nombre)}&select=id,nombre`)
    if (!rows || rows.error) return mostrarMsg('msg-login', 'Error de conexión', 'err')
    if (rows.length === 0) {
        if (!apuestasAbiertas) return mostrarMsg('msg-login', 'Las apuestas están cerradas.', 'err')
        const nuevo = await sbPost('participantes', { nombre })
        if (!nuevo || nuevo.error || nuevo.code) return mostrarMsg('msg-login', 'Error al registrar usuario', 'err')
        usuarioId = nuevo[0].id
    } else {
        usuarioId = rows[0].id
    }
    usuarioActual = nombre
    const apRows = await sbGet('apuestas', `participante_id=eq.${usuarioId}&select=partido_id,ganador`)
    apuestasUsuario = {}
    if (apRows && !apRows.error) apRows.forEach(a => apuestasUsuario[a.partido_id] = a.ganador)
    document.getElementById('apostar-login').classList.add('hidden')
    document.getElementById('apostar-form').classList.remove('hidden')
    document.getElementById('apostar-titulo').textContent = `Apuestas de ${nombre}`
    document.getElementById('msg-login').innerHTML = ''
    renderFormApuestas()
}

function renderFormApuestas() {
    const el = document.getElementById('lista-partidos-apostar')
    const cerradas = !apuestasAbiertas
    let html = ''
    PARTIDOS.forEach(p => {
        const sel = apuestasUsuario[p.id]
        const clsL = sel === 'local' ? ' sel-local' : ''
        const clsE = sel === 'empate' ? ' sel-empate' : ''
        const clsV = sel === 'visitante' ? ' sel-visitante' : ''
        const dis = cerradas ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''
        html += `<div class="partido-apuesta">
            <div class="partido-info">
                ${p.local} vs ${p.visitante}
                <small>${p.fecha}${p.grupo ? ' · Grupo ' + p.grupo : ''}</small>
            </div>
            <div class="opciones-apuesta">
                <button class="opt${clsL}" ${dis} onclick="setApuesta(${p.id},'local',this)">${p.local}</button>
                <button class="opt${clsE}" ${dis} onclick="setApuesta(${p.id},'empate',this)">Empate</button>
                <button class="opt${clsV}" ${dis} onclick="setApuesta(${p.id},'visitante',this)">${p.visitante}</button>
            </div>
        </div>`
    })
    el.innerHTML = html
    if (cerradas) {
        mostrarMsg('msg-guardar', 'Las apuestas están cerradas. Solo puedes consultar las tuyas.', 'info')
        document.querySelectorAll('.btn-accent').forEach(b => b.style.display = 'none')
    }
}

function setApuesta(partidoId, valor, btn) {
    const fila = btn.closest('.opciones-apuesta')
    fila.querySelectorAll('.opt').forEach(b => b.className = 'opt')
    const clsMap = { local: 'sel-local', empate: 'sel-empate', visitante: 'sel-visitante' }
    btn.classList.add(clsMap[valor])
    apuestasUsuario[partidoId] = valor
}

async function guardarApuestas() {
    if (!apuestasAbiertas) return
    mostrarMsg('msg-guardar', '<span class="spinner"></span>Guardando...', 'info')
    const rows = Object.entries(apuestasUsuario).map(([pid, g]) => ({
        participante_id: usuarioId,
        partido_id: parseInt(pid),
        ganador: g
    }))
    if (rows.length === 0) return mostrarMsg('msg-guardar', 'No has seleccionado ninguna apuesta.', 'err')
    const res = await sbUpsert('apuestas', rows, 'participante_id,partido_id')
    if (res && res.error) return mostrarMsg('msg-guardar', 'Error al guardar: ' + res.message, 'err')
    mostrarMsg('msg-guardar', 'Apuestas guardadas correctamente', 'ok')
}

function cerrarSesion() {
    usuarioActual = null
    usuarioId = null
    apuestasUsuario = {}
    document.getElementById('apostar-form').classList.add('hidden')
    document.getElementById('apostar-login').classList.remove('hidden')
    document.getElementById('input-nombre').value = ''
}

async function loginAdmin() {
    const pwd = document.getElementById('input-admin-pwd').value
    const hash = await sha1(pwd)
    const stored = window._adminHash || ADMIN_HASH
    if (hash !== stored) return mostrarMsg('msg-admin-login', 'Contraseña incorrecta', 'err')
    adminLogado = true
    document.getElementById('admin-login').classList.add('hidden')
    document.getElementById('admin-panel').classList.remove('hidden')
    document.getElementById('btn-toggle-apuestas').textContent = apuestasAbiertas ? 'Cerrar apuestas' : 'Abrir apuestas'
    cargarAdminPartidos()
}

function adminTab(tab) {
    document.getElementById('admin-resultados').classList.remove('hidden')
}

async function cargarAdminPartidos() {
    const el = document.getElementById('lista-admin-partidos')
    el.innerHTML = '<div class="loading-overlay"><span class="spinner"></span>Cargando...</div>'
    const res = await sbGet('resultados', 'select=partido_id,resultado_local,resultado_visitante')
    resultados = {}
    if (res && !res.error) res.forEach(r => resultados[r.partido_id] = r)
    let html = ''
    PARTIDOS.forEach(p => {
        const r = resultados[p.id] || {}
        const rl = r.resultado_local ?? ''
        const rv = r.resultado_visitante ?? ''
        html += `<div class="admin-partido-row">
            <span style="font-size:0.83rem">[${p.id}] ${p.local} vs ${p.visitante} <small style="color:var(--gris)">${p.fecha}</small></span>
            <input type="number" class="score-input" id="rl-${p.id}" value="${rl}" min="0" max="99" placeholder="-">
            <span style="color:var(--gris);font-size:0.85rem">–</span>
            <input type="number" class="score-input" id="rv-${p.id}" value="${rv}" min="0" max="99" placeholder="-">
        </div>`
    })
    el.innerHTML = html
}

async function guardarResultados() {
    const msg = document.getElementById('msg-resultados')
    msg.textContent = 'Guardando...'
    for (const p of PARTIDOS) {
        const rlEl = document.getElementById('rl-' + p.id)
        const rvEl = document.getElementById('rv-' + p.id)
        const rl = rlEl?.value.trim()
        const rv = rvEl?.value.trim()
        if (rl === '' && rv === '') {
            await sbDelete('resultados', `partido_id=eq.${p.id}`)
            continue
        }
        if (rl !== '' && rv !== '') {
            await sbUpsert('resultados', [{
                partido_id: p.id,
                resultado_local: parseInt(rl),
                resultado_visitante: parseInt(rv)
            }], 'partido_id')
        }
    }
    msg.textContent = 'Guardado'
    setTimeout(() => msg.textContent = '', 3000)
}

async function toggleApuestas() {
    apuestasAbiertas = !apuestasAbiertas
    await sbUpsert('config', [{ clave: 'apuestas_abiertas', valor: String(apuestasAbiertas) }], 'clave')
    document.getElementById('btn-toggle-apuestas').textContent = apuestasAbiertas ? 'Cerrar apuestas' : 'Abrir apuestas'
    const badge = document.getElementById('badge-estado')
    badge.textContent = apuestasAbiertas ? 'Apuestas abiertas' : 'Apuestas cerradas'
    badge.className = 'badge ' + (apuestasAbiertas ? 'badge-open' : 'badge-closed')
}

function cerrarAdmin() {
    adminLogado = false
    document.getElementById('admin-panel').classList.add('hidden')
    document.getElementById('admin-login').classList.remove('hidden')
    document.getElementById('input-admin-pwd').value = ''
}

function mostrarMsg(id, texto, tipo) {
    const el = document.getElementById(id)
    if (!el) return
    const cls = { ok: 'msg-ok', err: 'msg-err', info: 'msg-info' }
    el.innerHTML = `<div class="msg ${cls[tipo] || ''}">${texto}</div>`
}

async function sha1(str) {
    const buf = await crypto.subtle.digest('SHA-1', new TextEncoder().encode(str))
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('')
}

async function init() {
    await cargarConfig()
    await renderClasificacion()
}

init()
